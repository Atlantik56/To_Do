      :root{color-scheme:dark;--bg:#090a0f;--panel:#11141d;--panel2:#181c27;--line:rgba(255,255,255,.12);--text:#f6f7fb;--muted:#9da6b8;--accent:#7c9cff;--high:#e66767;--medium:#d7ad47;--low:#7aa4c7}*{box-sizing:border-box}body{margin:0;min-width:320px;min-height:100vh;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top left,rgba(124,156,255,.18),transparent 34rem),linear-gradient(135deg,rgba(255,255,255,.035),transparent 38rem),var(--bg);color:var(--text)}button,input,select,textarea{font:inherit}button{cursor:pointer;border:0;border-radius:8px;font-weight:800;transition:transform .18s ease,background .18s ease,border-color .18s ease}button:hover{transform:translateY(-1px)}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;background:rgba(7,8,13,.72);color:var(--text);outline:none;transition:border-color .18s ease,box-shadow .18s ease,background .18s ease}input,select{min-height:44px;padding:0 .85rem}textarea{min-height:120px;resize:vertical;padding:.8rem .85rem;line-height:1.5}input:focus,select:focus,textarea:focus{border-color:rgba(124,156,255,.8);background:rgba(14,16,24,.96);box-shadow:0 0 0 4px rgba(124,156,255,.14)}.shell{width:min(1480px,calc(100% - 32px));margin:0 auto;padding:32px 0 48px}.hero{display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,460px);gap:24px;align-items:end;padding:26px 0 30px}.kicker{margin:0 0 10px;color:#9fb6ff;font-size:.78rem;font-weight:900;text-transform:uppercase}.hero h1{max-width:760px;margin:0;font-size:clamp(2.25rem,6vw,5rem);line-height:.96}.subtitle{max-width:620px;margin:18px 0 0;color:var(--muted);font-size:1.06rem;line-height:1.6}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:10px;border:1px solid var(--line);border-radius:8px;background:rgba(16,18,25,.72);box-shadow:0 24px 80px rgba(0,0,0,.38);backdrop-filter:blur(18px)}.stat{padding:16px;border:1px solid var(--line);bor
