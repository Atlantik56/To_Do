<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Современный планировщик рабочих задач" />
    <title>Планировщик рабочих задач</title>
    <style>
      :root{color-scheme:dark;--bg:#090a0f;--panel:#11141d;--panel2:#181c27;--line:rgba(255,255,255,.12);--line2:rgba(255,255,255,.2);--text:#f6f7fb;--muted:#9da6b8;--accent:#7c9cff;--high:#e66767;--medium:#d7ad47;--low:#7aa4c7}*{box-sizing:border-box}body{margin:0;min-width:320px;min-height:100vh;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top left,rgba(124,156,255,.18),transparent 34rem),linear-gradient(135deg,rgba(255,255,255,.035),transparent 38rem),var(--bg);color:var(--text)}button,input,select,textarea{font:inherit}button{cursor:pointer;border:0;border-radius:8px;font-weight:800;transition:transform .18s ease,background .18s ease,border-color .18s ease}button:hover{transform:translateY(-1px)}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;background:rgba(7,8,13,.72);color:var(--text);outline:none;transition:border-color .18s ease,box-shadow .18s ease,background .18s ease}input,select{min-height:44px;padding:0 .85rem}textarea{min-height:120px;resize:vertical;padding:.8rem .85rem;line-height:1.5}input:focus,select:focus,textarea:focus{border-color:rgba(124,156,255,.8);background:rgba(14,16,24,.96);box-shadow:0 0 0 4px rgba(124,156,255,.14)}.shell{width:min(1480px,calc(100% - 32px));margin:0 auto;padding:32px 0 48px}.hero{display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,460px);gap:24px;align-items:end;padding:26px 0 30px}.kicker{margin:0 0 10px;color:#9fb6ff;font-size:.78rem;font-weight:900;text-transform:uppercase}.hero h1{max-width:760px;margin:0;font-size:clamp(2.25rem,6vw,5rem);line-height:.96}.subtitle{max-width:620px;margin:18px 0 0;color:var(--muted);font-size:1.06rem;line-height:1.6}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:10px;border:1px solid var(--line);border-radius:8px;background:rgba(16,18,25,.72);box-shadow:0 24px 80px rgba(0,0,0,.38);backdrop-filter:blur(18px)}.stat{padding:16px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.035)}.stat span{display:block;color:var(--muted);font-size:.82rem}.stat strong{display:block;margin-top:8px;font-size:2rem;line-height:1}.workspace{display:grid;grid-template-columns:minmax(300px,380px) minmax(0,1fr);gap:18px;align-items:start}.form{position:sticky;top:18px;display:grid;gap:16px;padding:18px;border:1px solid var(--line);border-radius:8px;background:linear-gradient(180deg,rgba(23,26,36,.96),rgba(14,16,23,.96));box-shadow:0 24px 80px rgba(0,0,0,.38)}.eyebrow{margin:0 0 6px;color:#9fb6ff;font-size:.74rem;font-weight:900;text-transform:uppercase}.form h2{margin:0;font-size:1.35rem}.field{display:grid;gap:8px}.field span,.status-control span{color:#c3c9d6;font-size:.82rem;font-weight:800}.grid-fields{display:grid;grid-template-columns:1fr 1fr;gap:12px}.actions{display:flex;justify-content:flex-end;gap:10px}.primary{min-height:44px;padding:0 1rem;background:linear-gradient(135deg,var(--accent),#a478ff);color:white;box-shadow:0 12px 32px rgba(124,156,255,.25)}.ghost,.reset,.card-actions button{min-height:44px;padding:0 1rem;border:1px solid var(--line);background:rgba(255,255,255,.06);color:#c3c9d6}.board-area{display:grid;gap:14px;min-width:0}.filters{display:grid;grid-template-columns:minmax(220px,1fr) minmax(160px,210px) minmax(160px,210px) auto;gap:10px;align-items:end;padding:12px;border:1px solid var(--line);border-radius:8px;background:rgba(16,18,25,.78);backdrop-filter:blur(16px)}.filters label{display:grid;gap:7px}.filters span{color:var(--muted);font-size:.78rem;font-weight:800}.board{display:grid;grid-template-columns:repeat(3,minmax(240px,1fr));gap:14px}.column{min-width:0;min-height:520px;padding:12px;border:1px solid var(--line);border-radius:8px;background:rgba(16,18,25,.66)}.column-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}.column h2{margin:0;color:#c3c9d6;font-size:.95rem}.count{display:inline-grid;min-width:30px;height:30px;place-items:center;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.05);color:var(--muted);font-weight:900}.list{display:grid;align-content:start;gap:12px}.empty{display:grid;min-height:160px;place-items:center;border:1px dashed var(--line2);border-radius:8px;color:var(--muted)}.card{position:relative;display:grid;gap:12px;padding:14px;overflow:hidden;border:1px solid var(--line);border-radius:8px;background:linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.035));animation:enter .28s ease both;transition:transform .18s ease,border-color .18s ease,background .18s ease,box-shadow .18s ease}.card:before{position:absolute;inset:0 auto 0 0;width:3px;content:""}.card:hover{transform:translateY(-3px);border-color:var(--line2);background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.045));box-shadow:0 18px 44px rgba(0,0,0,.26)}.high:before{background:var(--high)}.medium:before{background:var(--medium)}.low:before{background:var(--low)}.top{display:flex;align-items:center;justify-content:space-between;gap:10px}.badge{display:inline-flex;align-items:center;min-height:28px;padding:0 .62rem;border:1px solid var(--line);border-radius:8px;font-size:.78rem;font-weight:900}.high .badge{background:rgba(230,103,103,.12);color:#ffb1b1}.medium .badge{background:rgba(215,173,71,.12);color:#f5d486}.low .badge{background:rgba(122,164,199,.12);color:#b8d8ef}.top time{color:var(--muted);font-size:.78rem}.card h3{margin:0;overflow-wrap:anywhere;font-size:1.02rem;line-height:1.35}.card p{margin:0;overflow-wrap:anywhere;color:var(--muted);font-size:.92rem;line-height:1.55}.status-control{display:grid;gap:7px}.card-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.danger{background:rgba(230,103,103,.1)!important;color:#ffb1b1!important}@keyframes enter{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}@media(max-width:1080px){.hero,.workspace{grid-template-columns:1fr}.form{position:static}.stats{max-width:560px}}@media(max-width:860px){.board{grid-template-columns:1fr}.column{min-height:260px}}@media(max-width:620px){.shell{width:min(100% - 20px,1480px);padding-top:18px}.stats,.filters,.grid-fields{grid-template-columns:1fr}}@media(max-width:900px) and (min-width:621px){.filters{grid-template-columns:1fr 1fr}}
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div><p class="kicker">Workspace planner</p><h1>Планировщик рабочих задач</h1><p class="subtitle">Канбан-доска для фокуса, приоритетов и быстрых рабочих решений.</p></div>
        <div class="stats" id="stats"></div>
      </section>
      <section class="workspace">
        <form class="form" id="taskForm">
          <div><p class="eyebrow" id="modeLabel">Новая задача</p><h2 id="formTitle">Добавить в работу</h2></div>
          <label class="field"><span>Название</span><input id="title" maxlength="80" placeholder="Например: синхронизировать команду" required /></label>
          <label class="field"><span>Описание</span><textarea id="description" maxlength="260" placeholder="Контекст, критерии готовности или важные детали"></textarea></label>
          <div class="grid-fields"><label class="field"><span>Приоритет</span><select id="priority"></select></label><label class="field"><span>Статус</span><select id="status"></select></label></div>
          <div class="actions"><button class="ghost" id="cancelEdit" type="button" hidden>Отмена</button><button class="primary" type="submit" id="saveButton">Создать задачу</button></div>
        </form>
        <div class="board-area">
          <section class="filters">
            <label><span>Поиск</span><input id="search" type="search" placeholder="Найти задачу по названию" /></label>
            <label><span>Статус</span><select id="filterStatus"></select></label>
            <label><span>Приоритет</span><select id="filterPriority"></select></label>
            <button class="reset" id="resetFilters" type="button">Сбросить</button>
          </section>
          <section class="board" id="board"></section>
        </div>
      </section>
    </main>
    <script>
      const STATUSES=[['todo','К выполнению'],['progress','В процессе'],['done','Готово']],PRIORITIES=[['high','Высокий'],['medium','Средний'],['low','Низкий']],KEY='work-task-planner.tasks.v2';
      const starter=[{id:'task-1',title:'Подготовить недельный план',description:'Собрать ключевые задачи, зависимости и риски по проекту.',priority:'high',status:'todo',createdAt:Date.now()-144e5},{id:'task-2',title:'Обновить дизайн-систему',description:'Проверить состояния кнопок, полей ввода и карточек задач.',priority:'medium',status:'progress',createdAt:Date.now()-72e5},{id:'task-3',title:'Закрыть ретро-заметки',description:'Перенести выводы из ретроспективы в список улучшений.',priority:'low',status:'done',createdAt:Date.now()-12e5}];
      let tasks=load(),editingId=null,filters={search:'',status:'all',priority:'all'};
      const $=id=>document.getElementById(id),esc=s=>String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
      function load(){try{return JSON.parse(localStorage.getItem(KEY))||starter}catch{return starter}}function save(){localStorage.setItem(KEY,JSON.stringify(tasks))}
      function optionHtml(items){return items.map(([v,l])=>`<option value="${v}">${l}</option>`).join('')}function label(arr,v){return arr.find(x=>x[0]===v)?.[1]||v}
      function init(){ $('priority').innerHTML=optionHtml(PRIORITIES);$('status').innerHTML=optionHtml(STATUSES);$('filterStatus').innerHTML=optionHtml([['all','Все статусы'],...STATUSES]);$('filterPriority').innerHTML=optionHtml([['all','Все приоритеты'],...PRIORITIES]);bind();render() }
      function bind(){ $('taskForm').addEventListener('submit',onSubmit);$('cancelEdit').addEventListener('click',resetForm);$('search').addEventListener('input',e=>{filters.search=e.target.value;render()});$('filterStatus').addEventListener('change',e=>{filters.status=e.target.value;render()});$('filterPriority').addEventListener('change',e=>{filters.priority=e.target.value;render()});$('resetFilters').addEventListener('click',()=>{filters={search:'',status:'all',priority:'all'};$('search').value='';$('filterStatus').value='all';$('filterPriority').value='all';render()})}
      function onSubmit(e){e.preventDefault();const data={title:$('title').value.trim(),description:$('description').value.trim(),priority:$('priority').value,status:$('status').value};if(!data.title)return;if(editingId){tasks=tasks.map(t=>t.id===editingId?{...t,...data}:t);resetForm()}else{tasks=[{...data,id:crypto.randomUUID(),createdAt:Date.now()},...tasks];$('taskForm').reset();$('priority').value='medium';$('status').value='todo'}save();render()}
      function resetForm(){editingId=null;$('taskForm').reset();$('priority').value='medium';$('status').value='todo';$('modeLabel').textContent='Новая задача';$('formTitle').textContent='Добавить в работу';$('saveButton').textContent='Создать задачу';$('cancelEdit').hidden=true}
      function edit(id){const t=tasks.find(x=>x.id===id);if(!t)return;editingId=id;$('title').value=t.title;$('description').value=t.description;$('priority').value=t.priority;$('status').value=t.status;$('modeLabel').textContent='Редактирование';$('formTitle').textContent='Обновить карточку';$('saveButton').textContent='Сохранить';$('cancelEdit').hidden=false;scrollTo({top:0,behavior:'smooth'})}
      function del(id){tasks=tasks.filter(t=>t.id!==id);if(editingId===id)resetForm();save();render()}function setStatus(id,status){tasks=tasks.map(t=>t.id===id?{...t,status}:t);save();render()}
      function visible(){const q=filters.search.trim().toLowerCase();return tasks.filter(t=>t.title.toLowerCase().includes(q)&&(filters.status==='all'||t.status===filters.status)&&(filters.priority==='all'||t.priority===filters.priority))}
      function render(){const v=visible();$('stats').innerHTML=STATUSES.map(([s,l])=>`<div class="stat"><span>${l}</span><strong>${tasks.filter(t=>t.status===s).length}</strong></div>`).join('');$('board').innerHTML=STATUSES.map(([s,l])=>{const col=v.filter(t=>t.status===s);return `<article class="column"><header class="column-head"><h2>${l}</h2><span class="count">${col.length}</span></header><div class="list">${col.length?col.map(card).join(''):'<div class="empty">Здесь пока тихо</div>'}</div></article>`}).join('');document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>edit(b.dataset.edit));document.querySelectorAll('[data-delete]').forEach(b=>b.onclick=()=>del(b.dataset.delete));document.querySelectorAll('[data-status]').forEach(s=>s.onchange=e=>setStatus(s.dataset.status,e.target.value))}
      function card(t){const date=new Intl.DateTimeFormat('ru-RU',{day:'2-digit',month:'short'}).format(t.createdAt);return `<article class="card ${t.priority}"><div class="top"><span class="badge">${label(PRIORITIES,t.priority)}</span><time>${date}</time></div><h3>${esc(t.title)}</h3>${t.description?`<p>${esc(t.description)}</p>`:''}<label class="status-control"><span>Статус</span><select data-status="${t.id}">${STATUSES.map(([v,l])=>`<option value="${v}" ${v===t.status?'selected':''}>${l}</option>`).join('')}</select></label><div class="card-actions"><button type="button" data-edit="${t.id}">Изменить</button><button class="danger" type="button" data-delete="${t.id}">Удалить</button></div></article>`}
      init();
    </script>
  </body>
</html>
